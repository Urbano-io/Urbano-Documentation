name: ci 
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v4
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV 
      - uses: actions/cache@v3
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - run: pip install mkdocs-material
      - run: pip install mkdocs-multirepo-plugin
      - run: pip install mkdocs-git-revision-date-localized-plugin
      - run: pip install mkdocs-minify-plugin
      - run: pip install mkdocs-git-authors-plugin
      - run: pip install mkdocs-git-committers-plugin-2
      - run: pip install mkdocs-title-casing-plugin
      - run: pip install mkdocs-glightbox
      - run: pip install markdown-include
      - run: pip install mkdocs-video
      - run: pip install mkdocs-awesome-pages-plugin
      - run: pip install mike
      - run: |
          # Use default version if version.txt doesn't exist yet
          VERSION="2.2.1.2"
          if [ -f "docs/version.txt" ]; then
            VERSION=$(cat docs/version.txt)
          fi
          echo "Deploying version $VERSION"
          
          # Setup CNAME inside docs so mike preserves it
          echo 'docs.urbano.io' > docs/CNAME
          
          # Deploy using mike and push to gh-pages
          mike deploy $VERSION latest --update-aliases --push
